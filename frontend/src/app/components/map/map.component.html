<!-- Barre de recherche -->
<div class="map-search">
  <div class="search-box">
    <input
      type="text"
      placeholder="Rechercher une ville..."
      [(ngModel)]="city"
      (input)="autocomplete()"
      (keyup.enter)="searchCity()"
    />
    <button class="search-btn" (click)="searchCity()">Rechercher</button>
    <button class="locate-btn" (click)="locateUser()">📍 Me localiser</button>
    <button class="clear-btn" (click)="clearSelection()" *ngIf="selectedCity || city">✕</button>

    <div class="loader" *ngIf="loadingLocation">Localisation en cours...</div>

    <ul *ngIf="suggestions.length" class="suggestions">
      <li *ngFor="let place of suggestions" (click)="selectCity(place)">
        {{ place.properties.formatted }}
      </li>
    </ul>
  </div>
</div>

<!-- Carte -->
<div #map class="map-container"></div>

<!-- Bloc inférieur : coordonnées et ville -->
<div class="map-info-panel" *ngIf="selectedLat !== null || isLoadingReverse">

  <div class="info-loading" *ngIf="isLoadingReverse">
    <span class="spinner"></span> Recherche de l'emplacement...
  </div>

  <div class="info-content" *ngIf="!isLoadingReverse && selectedLat !== null">
    <div class="info-item">
      <span class="info-icon">📍</span>
      <div>
        <span class="info-label">Ville</span>
        <span class="info-value">{{ selectedCity || '—' }}</span>
      </div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-icon">🌐</span>
      <div>
        <span class="info-label">Latitude</span>
        <span class="info-value">{{ selectedLat }}°</span>
      </div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-icon">🌐</span>
      <div>
        <span class="info-label">Longitude</span>
        <span class="info-value">{{ selectedLon }}°</span>
      </div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-icon">🌡️</span>
      <div>
        <span class="info-label">Météo</span>
        <button class="btn-weather">Voir la météo</button>
      </div>
    </div>
  </div>

</div>
